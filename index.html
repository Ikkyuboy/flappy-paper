<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>紙ヒコーキ - Kami Hikouki</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #2a2a2a; }
    #gameCanvas { display: block; margin: 0 auto; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
// ============================================================
// 紙ヒコーキ (Kami Hikouki) - Paper Airplane Chase
// ============================================================

// === CONSTANTS ===
const WALL_THICKNESS = 30;
const PLATFORM_HEIGHT = 10;
const OBSTACLE_MIN_GAP = 130;
const OBSTACLE_MAX_GAP = 190;
const SPAWN_AHEAD = 800;
const CLEANUP_BEHIND = 400;
const PLAYER_WIDTH = 22;
const PLAYER_HEIGHT = 14;
const GAME_OVER_DELAY = 800;
const WINDOW_INTERVAL = 250;
const WINDOW_WIDTH = 60;
const WINDOW_HEIGHT = 50;
const POINTS_PER_THEME = 20;

// === MOVEMENT CONSTANTS ===
const ANGLE_STEP = 20;           // degrees per tap
const MAX_ANGLE = 80;            // max angle from vertical
const BASE_SPEED_100 = 95;       // speed at 0° in 100-scale
const MAX_SPEED_100 = 170;       // max accelerated speed
const ACCEL_THRESHOLD = 20;      // angle below which acceleration kicks in (degrees)
const ACCEL_RATE = 0.5;          // acceleration per frame (100-scale)
const DECEL_RATE = 0.05;         // lerp factor for deceleration

// === OBSTACLE CONSTANTS ===
const DOUBLE_OBSTACLE_CHANCE = 0.35;
const SINGLE_MIN_RATIO = 0.4;    // 80/200
const SINGLE_MAX_RATIO = 0.6;    // 120/200
const DOUBLE_MAX_COMBINED = 0.85; // 170/200
const DOUBLE_MIN_EACH = 0.2;     // 40/200 minimum per side

// === COLOR THEMES ===
const THEMES = [
  { brick: "#7B5B4C", brickLight: "#8E6E5E", mortar: "#4A3530", window: "#4488CC" },
  { brick: "#8B3030", brickLight: "#A04040", mortar: "#4A1515", window: "#CC4444" },
  { brick: "#3B6B3B", brickLight: "#4A8A4A", mortar: "#1A3A1A", window: "#44CC66" },
  { brick: "#3B4B8B", brickLight: "#4A5AA0", mortar: "#1A2550", window: "#4488FF" },
  { brick: "#6B3B7B", brickLight: "#8A4A9A", mortar: "#3A1A4A", window: "#AA44CC" },
  { brick: "#8B7B30", brickLight: "#A09040", mortar: "#4A4015", window: "#CCCC44" },
];

// === STATE ===
let gameState = "TITLE";
let score = 0;
let highScore = parseInt(localStorage.getItem("kamiHikouki_highScore")) || 0;
let gameOverTime = 0;
let titleAnimTime = 0;

function getCurrentTheme() {
  return THEMES[Math.floor(score / POINTS_PER_THEME) % THEMES.length];
}

// === CANVAS SETUP ===
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let canvasWidth, canvasHeight, towerWidth, towerLeft, dpr, speedScale;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  const maxW = 420;
  const w = Math.min(window.innerWidth, maxW);
  const h = window.innerHeight;

  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  canvasWidth = w;
  canvasHeight = h;
  towerWidth = canvasWidth - WALL_THICKNESS * 2;
  towerLeft = WALL_THICKNESS;
  speedScale = towerWidth / 200 / 60;

  createBrickPattern();
}

// === BRICK PATTERN ===
let brickPattern = null;
let brickPatternThemeIndex = -1;

function createBrickPattern() {
  const theme = getCurrentTheme();
  const themeIdx = Math.floor(score / POINTS_PER_THEME) % THEMES.length;
  brickPatternThemeIndex = themeIdx;

  const brickW = 28;
  const brickH = 14;
  const mortarW = 2;
  const patW = brickW + mortarW;
  const patH = (brickH + mortarW) * 2;

  const offscreen = document.createElement("canvas");
  offscreen.width = patW;
  offscreen.height = patH;
  const octx = offscreen.getContext("2d");

  octx.fillStyle = theme.mortar;
  octx.fillRect(0, 0, patW, patH);

  octx.fillStyle = theme.brick;
  octx.fillRect(0, 0, brickW, brickH);
  octx.fillStyle = theme.brickLight;
  octx.fillRect(1, 1, brickW - 2, 3);

  const offset = Math.floor(patW / 2);
  octx.fillStyle = theme.brick;
  octx.fillRect(-offset, brickH + mortarW, brickW, brickH);
  octx.fillRect(-offset + patW, brickH + mortarW, brickW, brickH);
  octx.fillStyle = theme.brickLight;
  octx.fillRect(-offset + 1, brickH + mortarW + 1, brickW - 2, 3);
  octx.fillRect(-offset + patW + 1, brickH + mortarW + 1, brickW - 2, 3);

  brickPattern = ctx.createPattern(offscreen, "repeat");
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// === PLAYER ===
let player = {
  x: 0, y: 0,
  angleDeg: 0,
  speed: BASE_SPEED_100,
  dead: false,
  deathScale: 1,
  deathAngle: 0
};

function resetPlayer() {
  player.x = towerWidth / 2;
  player.y = 0;
  player.angleDeg = 0;
  player.speed = BASE_SPEED_100;
  player.dead = false;
  player.deathScale = 1;
  player.deathAngle = 0;
}

// === CAMERA ===
let camera = { y: 0 };

// === OBSTACLES ===
let obstacles = [];
let lastObstacleY = 0;
let obstacleGroupId = 0;

function resetObstacles() {
  obstacles = [];
  lastObstacleY = 250;
  obstacleGroupId = 0;
}

function generateObstacles() {
  var generateTo = camera.y + canvasHeight + SPAWN_AHEAD;

  while (lastObstacleY < generateTo) {
    var gap = OBSTACLE_MIN_GAP + Math.random() * (OBSTACLE_MAX_GAP - OBSTACLE_MIN_GAP);
    lastObstacleY += gap;
    obstacleGroupId++;

    var isDouble = Math.random() < DOUBLE_OBSTACLE_CHANCE;

    if (isDouble) {
      // Double-side: both walls, combined max DOUBLE_MAX_COMBINED
      var leftRatio = DOUBLE_MIN_EACH + Math.random() * (SINGLE_MAX_RATIO - DOUBLE_MIN_EACH);
      var maxRight = DOUBLE_MAX_COMBINED - leftRatio;
      var rightRatio = DOUBLE_MIN_EACH + Math.random() * (Math.min(maxRight, SINGLE_MAX_RATIO) - DOUBLE_MIN_EACH);

      obstacles.push({
        x: 0, y: lastObstacleY,
        width: towerWidth * leftRatio, height: PLATFORM_HEIGHT,
        side: "left", passed: false, groupId: obstacleGroupId
      });
      obstacles.push({
        x: towerWidth - towerWidth * rightRatio, y: lastObstacleY,
        width: towerWidth * rightRatio, height: PLATFORM_HEIGHT,
        side: "right", passed: false, groupId: obstacleGroupId
      });
    } else {
      // Single-side: one wall, 80-120 units (0.4-0.6 of towerWidth)
      var side = Math.random() < 0.5 ? "left" : "right";
      var platRatio = SINGLE_MIN_RATIO + Math.random() * (SINGLE_MAX_RATIO - SINGLE_MIN_RATIO);
      var platWidth = towerWidth * platRatio;

      obstacles.push({
        x: side === "left" ? 0 : towerWidth - platWidth,
        y: lastObstacleY,
        width: platWidth, height: PLATFORM_HEIGHT,
        side: side, passed: false, groupId: obstacleGroupId
      });
    }
  }
}

function cleanupObstacles() {
  obstacles = obstacles.filter(o => o.y > camera.y - CLEANUP_BEHIND);
}

// === INPUT ===
const input = { anyPress: false };
let tapQueue = [];

function getTouchSide(x) {
  return x < canvasWidth / 2 ? "left" : "right";
}

function handleKeyDown(e) {
  if (e.repeat) return;
  if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") tapQueue.push("left");
  if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") tapQueue.push("right");
  input.anyPress = true;
  e.preventDefault();
}

window.addEventListener("keydown", handleKeyDown);

canvas.addEventListener("touchstart", function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var touch = e.changedTouches[i];
    var rect = canvas.getBoundingClientRect();
    tapQueue.push(getTouchSide(touch.clientX - rect.left));
  }
  input.anyPress = true;
}, { passive: false });

canvas.addEventListener("touchend", function(e) {
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("mousedown", function(e) {
  var rect = canvas.getBoundingClientRect();
  tapQueue.push(getTouchSide(e.clientX - rect.left));
  input.anyPress = true;
});

// === COLLISION ===
function checkCollision() {
  var px = player.x;
  var py = player.y;
  var hw = PLAYER_WIDTH / 2;
  var hh = PLAYER_HEIGHT / 2;

  if (px - hw < 0 || px + hw > towerWidth) return true;

  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    if (px + hw > o.x && px - hw < o.x + o.width &&
        py + hh > o.y && py - hh < o.y + o.height) {
      return true;
    }
  }
  return false;
}

// === PARTICLES ===
let particles = [];

function spawnDeathParticles() {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: player.x, y: player.y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 1,
      life: 1.0,
      size: 2 + Math.random() * 4,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.05 * dt;
    p.rotation += p.rotSpeed * dt;
    p.life -= 0.015 * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// === UTILITIES ===
function lerp(a, b, t) { return a + (b - a) * t; }
function padScore(n, len) { return String(n).padStart(len, "0"); }

function lightenColor(hex, amount) {
  var r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amount);
  var g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amount);
  var b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amount);
  return "rgb(" + r + "," + g + "," + b + ")";
}

// === GAME LOGIC ===
function startGame() {
  gameState = "PLAYING";
  score = 0;
  tapQueue = [];
  resetPlayer();
  resetObstacles();
  particles = [];
  camera.y = player.y - canvasHeight * 0.33;
  createBrickPattern();
  generateObstacles();
}

function updatePlaying(dt) {
  // 1. Process taps → rotate by ANGLE_STEP
  while (tapQueue.length > 0) {
    var tap = tapQueue.shift();
    if (tap === "right") player.angleDeg = Math.min(MAX_ANGLE, player.angleDeg + ANGLE_STEP);
    if (tap === "left") player.angleDeg = Math.max(-MAX_ANGLE, player.angleDeg - ANGLE_STEP);
  }

  // 2. Compute speed based on angle
  var absAngle = Math.abs(player.angleDeg);
  var targetSpeed = BASE_SPEED_100 - absAngle / 2;

  if (absAngle <= ACCEL_THRESHOLD) {
    // Near-vertical: accelerate toward max speed
    var accelFactor = 1 - absAngle / ACCEL_THRESHOLD;
    player.speed = Math.min(MAX_SPEED_100, player.speed + ACCEL_RATE * accelFactor * dt);
  } else {
    // At higher angles: decelerate toward target speed
    player.speed = lerp(player.speed, targetSpeed, DECEL_RATE * dt);
  }

  // 3. Convert angle + speed to velocity
  var angleRad = player.angleDeg * Math.PI / 180;
  var pxSpeed = player.speed * speedScale * dt;
  var vx = pxSpeed * Math.sin(angleRad);
  var vy = pxSpeed * Math.cos(angleRad);

  // 4. Move player
  player.x += vx;
  player.y += vy;

  // 5. Camera
  var targetCamY = player.y - canvasHeight * 0.33;
  camera.y = lerp(camera.y, targetCamY, 0.06 * dt);

  // 6. Score: count obstacle groups passed
  var scoredGroups = {};
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    if (!o.passed && player.y > o.y + o.height) {
      o.passed = true;
      if (!scoredGroups[o.groupId]) {
        scoredGroups[o.groupId] = true;
        score++;
      }
    }
  }

  var newThemeIdx = Math.floor(score / POINTS_PER_THEME) % THEMES.length;
  if (newThemeIdx !== brickPatternThemeIndex) createBrickPattern();

  generateObstacles();
  cleanupObstacles();

  if (checkCollision()) {
    gameState = "GAME_OVER";
    gameOverTime = performance.now();
    player.dead = true;
    spawnDeathParticles();
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("kamiHikouki_highScore", highScore);
    }
  }
}

function updateGameOver(dt) {
  tapQueue = [];
  if (player.deathScale > 0.1) {
    player.deathScale = lerp(player.deathScale, 0, 0.04 * dt);
    player.deathAngle += 0.15 * dt;
  }
  updateParticles(dt);
  if (input.anyPress && performance.now() - gameOverTime > GAME_OVER_DELAY) {
    gameState = "TITLE";
    input.anyPress = false;
  }
}

function updateTitle(dt) {
  tapQueue = [];
  titleAnimTime += dt * 0.02;
  if (input.anyPress) {
    startGame();
    input.anyPress = false;
  }
}

// === RENDERING ===
function drawBackground() {
  ctx.save();
  ctx.beginPath();
  ctx.rect(towerLeft, 0, towerWidth, canvasHeight);
  ctx.clip();
  ctx.translate(towerLeft, -(camera.y % 32));
  ctx.fillStyle = brickPattern;
  ctx.fillRect(0, -32, towerWidth, canvasHeight + 64);
  ctx.restore();
}

function drawWalls() {
  var lgrd = ctx.createLinearGradient(0, 0, towerLeft, 0);
  lgrd.addColorStop(0, "#606060");
  lgrd.addColorStop(0.3, "#909090");
  lgrd.addColorStop(0.5, "#A8A8A8");
  lgrd.addColorStop(0.7, "#909090");
  lgrd.addColorStop(1, "#686868");
  ctx.fillStyle = lgrd;
  ctx.fillRect(0, 0, towerLeft, canvasHeight);

  var rgrd = ctx.createLinearGradient(towerLeft + towerWidth, 0, canvasWidth, 0);
  rgrd.addColorStop(0, "#686868");
  rgrd.addColorStop(0.3, "#909090");
  rgrd.addColorStop(0.5, "#A8A8A8");
  rgrd.addColorStop(0.7, "#909090");
  rgrd.addColorStop(1, "#606060");
  ctx.fillStyle = rgrd;
  ctx.fillRect(towerLeft + towerWidth, 0, WALL_THICKNESS, canvasHeight);

  ctx.fillStyle = "#BBBBBB";
  ctx.fillRect(towerLeft - 1, 0, 1, canvasHeight);
  ctx.fillRect(towerLeft + towerWidth, 0, 1, canvasHeight);
  ctx.fillStyle = "#444444";
  ctx.fillRect(0, 0, 1, canvasHeight);
  ctx.fillRect(canvasWidth - 1, 0, 1, canvasHeight);
}

function drawWindows() {
  var theme = getCurrentTheme();
  var startY = Math.floor((camera.y - WINDOW_HEIGHT) / WINDOW_INTERVAL) * WINDOW_INTERVAL;

  for (var wy = startY; wy < camera.y + canvasHeight + WINDOW_HEIGHT; wy += WINDOW_INTERVAL) {
    var screenY = wy - camera.y;
    var row = Math.floor(wy / WINDOW_INTERVAL);
    var wx;
    if (row % 3 === 0) {
      wx = towerLeft + towerWidth * 0.15 - WINDOW_WIDTH / 2;
    } else if (row % 3 === 1) {
      wx = towerLeft + towerWidth * 0.85 - WINDOW_WIDTH / 2;
    } else {
      wx = towerLeft + towerWidth * 0.5 - WINDOW_WIDTH / 2;
    }

    ctx.fillStyle = theme.mortar;
    ctx.fillRect(wx - 2, screenY - 2, WINDOW_WIDTH + 4, WINDOW_HEIGHT + 4);

    var wgrd = ctx.createLinearGradient(wx, screenY, wx, screenY + WINDOW_HEIGHT);
    wgrd.addColorStop(0, theme.window);
    wgrd.addColorStop(0.3, lightenColor(theme.window, 40));
    wgrd.addColorStop(1, theme.window);
    ctx.fillStyle = wgrd;
    ctx.fillRect(wx, screenY, WINDOW_WIDTH, WINDOW_HEIGHT);

    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.fillRect(wx + 3, screenY + 3, WINDOW_WIDTH * 0.4, WINDOW_HEIGHT * 0.3);
  }
}

function drawPlatforms() {
  ctx.save();
  ctx.translate(towerLeft, 0);

  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    var screenY = o.y - camera.y;
    if (screenY > canvasHeight + 20 || screenY + o.height < -20) continue;

    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(o.x + 2, screenY + 2, o.width, o.height);

    ctx.fillStyle = "#E8E0D8";
    ctx.fillRect(o.x, screenY, o.width, o.height);

    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(o.x, screenY, o.width, 2);

    ctx.strokeStyle = "#333333";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(o.x, screenY, o.width, o.height);

    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(o.x, screenY + o.height - 2, o.width, 2);
  }

  ctx.restore();
}

function drawPlane() {
  var screenX = towerLeft + player.x;
  var screenY = player.y - camera.y;

  ctx.save();
  ctx.translate(screenX, screenY);

  if (player.dead) {
    ctx.rotate(player.deathAngle);
    ctx.scale(player.deathScale, player.deathScale);
  } else {
    ctx.rotate(player.angleDeg * Math.PI / 180);
  }

  ctx.strokeStyle = "#FFFFFF";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.beginPath();
  ctx.moveTo(-10, -8);
  ctx.lineTo(0, 4);
  ctx.lineTo(10, -8);
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.3)";
  ctx.beginPath();
  ctx.moveTo(-10, -8);
  ctx.lineTo(0, 4);
  ctx.lineTo(10, -8);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var screenX = towerLeft + p.x;
    var screenY = p.y - camera.y;
    ctx.save();
    ctx.translate(screenX, screenY);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = p.life;
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.save();
  ctx.font = "bold 20px 'Courier New', monospace";
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillText(padScore(score, 3), canvasWidth / 2 + 1, 29);
  ctx.fillStyle = "#FFFFFF";
  ctx.fillText(padScore(score, 3), canvasWidth / 2, 28);

  ctx.font = "bold 12px 'Courier New', monospace";
  ctx.textAlign = "right";
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillText("HIGH SCORE " + padScore(highScore, 3), canvasWidth - 9, 17);
  ctx.fillStyle = "#FFFFFF";
  ctx.fillText("HIGH SCORE " + padScore(highScore, 3), canvasWidth - 10, 16);
  ctx.restore();
}

function drawTitleScreen() {
  ctx.save();
  ctx.fillStyle = brickPattern;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  ctx.restore();

  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  var floatY = Math.sin(titleAnimTime * 2) * 15;
  var floatAngle = Math.sin(titleAnimTime * 1.3) * 0.3;

  ctx.save();
  ctx.translate(canvasWidth / 2, canvasHeight * 0.30 + floatY);
  ctx.rotate(floatAngle);
  ctx.scale(3, 3);
  ctx.strokeStyle = "#FFFFFF";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(-10, -8);
  ctx.lineTo(0, 4);
  ctx.lineTo(10, -8);
  ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,0.3)";
  ctx.beginPath();
  ctx.moveTo(-10, -8);
  ctx.lineTo(0, 4);
  ctx.lineTo(10, -8);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.textAlign = "center";
  ctx.font = "bold 36px 'Courier New', monospace";
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillText("\u7D19\u30D2\u30B3\u30FC\u30AD", canvasWidth / 2 + 2, canvasHeight * 0.50 + 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fillText("\u7D19\u30D2\u30B3\u30FC\u30AD", canvasWidth / 2, canvasHeight * 0.50);

  ctx.font = "14px 'Courier New', monospace";
  ctx.fillStyle = "#CCBBAA";
  ctx.fillText("PAPER AIRPLANE CHASE", canvasWidth / 2, canvasHeight * 0.56);

  var blink = Math.sin(performance.now() / 500) > 0;
  if (blink) {
    ctx.font = "14px 'Courier New', monospace";
    ctx.fillStyle = "#FFFFFF";
    ctx.fillText("TAP or PRESS ANY KEY", canvasWidth / 2, canvasHeight * 0.72);
  }

  if (highScore > 0) {
    ctx.font = "bold 14px 'Courier New', monospace";
    ctx.fillStyle = "#CCBBAA";
    ctx.fillText("HIGH SCORE " + padScore(highScore, 3), canvasWidth / 2, canvasHeight * 0.80);
  }
}

function drawGameOverScreen() {
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  ctx.textAlign = "center";

  ctx.font = "bold 32px 'Courier New', monospace";
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillText("GAME OVER", canvasWidth / 2 + 2, canvasHeight * 0.35 + 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fillText("GAME OVER", canvasWidth / 2, canvasHeight * 0.35);

  ctx.font = "14px 'Courier New', monospace";
  ctx.fillStyle = "#CCBBAA";
  ctx.fillText("SCORE", canvasWidth / 2, canvasHeight * 0.42);

  ctx.font = "bold 48px 'Courier New', monospace";
  ctx.fillStyle = "#FFFFFF";
  ctx.fillText(padScore(score, 3), canvasWidth / 2, canvasHeight * 0.52);

  ctx.font = "bold 16px 'Courier New', monospace";
  ctx.fillStyle = "#CCBBAA";
  ctx.fillText("HIGH SCORE " + padScore(highScore, 3), canvasWidth / 2, canvasHeight * 0.60);

  if (score >= highScore && score > 0) {
    ctx.font = "bold 16px 'Courier New', monospace";
    ctx.fillStyle = "#FFCC44";
    ctx.fillText("NEW RECORD!", canvasWidth / 2, canvasHeight * 0.66);
  }

  var canRestart = performance.now() - gameOverTime > GAME_OVER_DELAY;
  if (canRestart) {
    var blink = Math.sin(performance.now() / 500) > 0;
    if (blink) {
      ctx.font = "14px 'Courier New', monospace";
      ctx.fillStyle = "#FFFFFF";
      ctx.fillText("TAP or PRESS ANY KEY", canvasWidth / 2, canvasHeight * 0.76);
    }
  }
}

function renderPlaying() {
  drawBackground();
  drawWindows();
  drawPlatforms();
  drawParticles();
  if (!player.dead || player.deathScale > 0.15) drawPlane();
  drawWalls();
  drawHUD();
}

function renderGameOver() {
  renderPlaying();
  drawGameOverScreen();
}

// === GAME LOOP ===
var lastTime = 0;

function gameLoop(timestamp) {
  var rawDt = (timestamp - lastTime) / 16.667;
  var dt = Math.min(rawDt, 3);
  lastTime = timestamp;

  ctx.clearRect(0, 0, canvasWidth, canvasHeight);

  switch (gameState) {
    case "TITLE":
      updateTitle(dt);
      drawTitleScreen();
      break;
    case "PLAYING":
      updatePlaying(dt);
      renderPlaying();
      break;
    case "GAME_OVER":
      updateGameOver(dt);
      renderGameOver();
      break;
  }

  input.anyPress = false;
  requestAnimationFrame(gameLoop);
}

// === INIT ===
requestAnimationFrame(function(ts) {
  lastTime = ts;
  gameLoop(ts);
});
  </script>
</body>
</html>
